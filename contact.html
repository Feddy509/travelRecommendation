<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactez-nous - Horizon Voyages</title>
    <link rel="stylesheet" href="travel_recommendation.css">
    <link rel="stylesheet" href="travel_recommendation.JS">
   <link rel="stylesheet" href="travel_recommendation.html">
    <link rel="stylesheet" href="about.html">
</head>
<body>

    <nav>
        <div class="logo">
            <h2>Horizon Voyages</h2>
        </div>
        <ul class="nav-links">
            <li><a href="index.html#accueil">Accueil</a></li>
            <li><a href="about.html">À propos de nous</a></li>
            <li><a href="contact.html">Contactez-nous</a></li>
        </ul>
    </nav>

    <main class="contact-container">
        <div class="contact-box">
            <h1>Contactez-nous</h1>
            <p class="contact-intro">Une question, une suggestion ou un projet de voyage en tête ? Écrivez-nous, notre équipe vous répondra dans les plus brefs délais.</p>
            
            <form id="contact-form">
                <div class="form-group">
                    <label for="name">Nom complet</label>
                    <input type="text" id="name" name="name" placeholder="Entrez votre nom" required>
                </div>

                <div class="form-group">
                    <label for="email">Adresse e-mail</label>
                    <input type="email" id="email" name="email" placeholder="Entrez votre adresse e-mail" required>
                </div>

                <div class="form-group">
                    <label for="message">Votre message</label>
                    <textarea id="message" name="message" rows="6" placeholder="Écrivez votre message ici..." required></textarea>
                </div>

                <button type="submit" id="btn-submit">Soumettre</button>
            </form>
        </div>
    </main>
    <script src="travel_recommendation.js"></script>

</body>
</html>
